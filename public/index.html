<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout - Elvevier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f5f5f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .checkout-container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 20px;
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 32px;
      align-items: start;
    }

    .left-col { display: flex; flex-direction: column; gap: 20px; }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 28px 28px 32px;
      border: 1px solid #e8e8e3;
    }

    .card-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 18px;
      color: #1a1a1a;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafaf8;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }

    input::placeholder { color: #aaa; }
    input:focus {
      border-color: #b8a080;
      box-shadow: 0 0 0 3px rgba(184, 160, 128, 0.15);
    }

    .field-group { margin-bottom: 16px; }
    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .right-col { position: sticky; top: 40px; }

    .summary-card {
      background: #fff;
      border-radius: 12px;
      padding: 28px;
      border: 1px solid #e8e8e3;
    }

    .summary-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .order-item {
      display: flex;
      gap: 14px;
      padding-bottom: 20px;
      margin-bottom: 18px;
      border-bottom: 1px solid #eee;
    }

    .item-image {
      width: 64px;
      height: 64px;
      border-radius: 8px;
      object-fit: cover;
      background: #eee;
    }

    .item-details { flex: 1; }
    .item-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .item-variant { font-size: 12px; color: #888; margin-bottom: 4px; }
    .item-price { font-size: 14px; font-weight: 600; color: #1a1a1a; }

    .summary-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      color: #555;
      margin-bottom: 8px;
    }

    .summary-total {
      display: flex;
      justify-content: space-between;
      font-size: 17px;
      font-weight: 700;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #eee;
    }

    .btn-place-order {
      width: 100%;
      padding: 15px;
      margin-top: 22px;
      background: #b8a080;
      color: #fff;
      border: none;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-place-order:hover { background: #a68e6e; }
    .btn-place-order:active { transform: scale(0.98); }
    .btn-place-order:disabled {
      background: #ccc;
      cursor: not-allowed;
      transform: none;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 13px;
      color: #b8a080;
      text-decoration: underline;
      cursor: pointer;
    }

    .back-link:hover { color: #a68e6e; }

    .toast {
      position: fixed;
      top: 24px;
      right: 24px;
      padding: 16px 24px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      z-index: 1000;
      opacity: 0;
      transform: translateY(-12px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .toast.success { background: #2e7d32; }
    .toast.error { background: #c62828; }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 768px) {
      .checkout-container {
        grid-template-columns: 1fr;
        padding: 20px 16px;
      }
      .right-col { position: static; order: -1; }
    }
  </style>
</head>
<body>

<div class="checkout-container">
  <div class="left-col">
    <!-- Contact -->
    <div class="card">
      <div class="card-title">Contact</div>
      <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
      </div>
    </div>

    <!-- Delivery Address -->
    <div class="card">
      <div class="card-title">Delivery address</div>
      <div class="field-group field-row">
        <div>
          <label for="firstName">First name</label>
          <input type="text" id="firstName" placeholder="First name" />
        </div>
        <div>
          <label for="lastName">Last name</label>
          <input type="text" id="lastName" placeholder="Last name" />
        </div>
      </div>
      <div class="field-group">
        <label for="address">Address</label>
        <input type="text" id="address" placeholder="Street address" />
      </div>
      <div class="field-group">
        <label for="apartment">Apartment, suite, etc. (optional)</label>
        <input type="text" id="apartment" placeholder="Apt, floor, building" />
      </div>
      <div class="field-group field-row">
        <div>
          <label for="city">City</label>
          <input type="text" id="city" placeholder="City" />
        </div>
        <div>
          <label for="state">State / Province</label>
          <input type="text" id="state" placeholder="State" />
        </div>
      </div>
      <div class="field-group field-row">
        <div>
          <label for="postalCode">Postal code</label>
          <input type="text" id="postalCode" placeholder="Postal code" />
        </div>
        <div>
          <label for="phone">Phone</label>
          <input type="tel" id="phone" placeholder="03XX XXXXXXX" />
        </div>
      </div>
    </div>
  </div>

  <!-- Order Summary -->
  <div class="right-col">
    <div class="summary-card">
      <div class="summary-title">Order summary</div>
      <div id="orderItems">
        <div class="order-item">
          <img class="item-image" src="https://images.unsplash.com/photo-1594938298603-c8148c4dae35?w=128&h=128&fit=crop" alt="Product" />
          <div class="item-details">
            <div class="item-name">Black Garden After Dark Pants</div>
            <div class="item-variant">Black</div>
            <div class="item-price">Rs. 3,950</div>
          </div>
        </div>
      </div>
      <div class="summary-row">
        <span>Subtotal (1 items)</span>
        <span id="subtotalDisplay">Rs. 3,950</span>
      </div>
      <div class="summary-row">
        <span>Shipping</span>
        <span>Free</span>
      </div>
      <div class="summary-total">
        <span>Total</span>
        <span id="totalDisplay">Rs. 3,950</span>
      </div>

      <button class="btn-place-order" id="placeOrderBtn" onclick="placeOrder()">
        Place order
      </button>
      <a class="back-link" href="#">Back to cart</a>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  function showToast(message, type) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.className = "toast " + type + " show";
    setTimeout(() => { toast.classList.remove("show"); }, 4000);
  }

  async function placeOrder() {
    const btn = document.getElementById("placeOrderBtn");

    const email = document.getElementById("email").value.trim();
    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const address = document.getElementById("address").value.trim();
    const apartment = document.getElementById("apartment").value.trim();
    const city = document.getElementById("city").value.trim();
    const state = document.getElementById("state").value.trim();
    const postalCode = document.getElementById("postalCode").value.trim();
    const phone = document.getElementById("phone").value.trim();

    if (!email || !firstName || !lastName || !address || !city || !phone) {
      showToast("Please fill in all required fields.", "error");
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Placing order...';

    try {
      const res = await fetch("/api/checkout", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email,
          firstName,
          lastName,
          address,
          apartment,
          city,
          state,
          postalCode,
          phone,
          orderItems: [
            {
              name: "Black Garden After Dark Pants",
              variant: "Black",
              price: 3950,
              quantity: 1,
            },
          ],
          subtotal: 3950,
          shipping: "Free",
          total: 3950,
        }),
      });

      const data = await res.json();

      if (res.ok) {
        showToast("Order placed successfully! ID: " + data.orderId, "success");
        btn.innerHTML = "Order Placed ✓";
      } else {
        showToast(data.error || "Something went wrong.", "error");
        btn.disabled = false;
        btn.innerHTML = "Place order";
      }
    } catch (err) {
      showToast("Network error. Please try again.", "error");
      btn.disabled = false;
      btn.innerHTML = "Place order";
    }
  }
</script>

</body>
</html>
